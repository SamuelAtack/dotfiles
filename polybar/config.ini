[colors]
background = #0a0e1c
background-alt = #0d1530
foreground = #CCCCCC
primary = #00FFD0
secondary = #00CED1
alert = #FF8C00
dim = #80E8EB

[bar/main]
monitor = eDP-1
width = 100%
height = 32
offset-x = 0
offset-y = 0
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-bottom-size = 2
border-bottom-color = ${colors.secondary}

padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1

font-0 = JetBrains Mono:size=10;2
font-1 = JetBrains Mono:Bold:size=10;2

modules-left = date playerctl
modules-center =
modules-right = bluetooth cpu memory wireless battery lock

separator = %{F#00CED1} | %{F-}

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M:%S
label = %{F#00FFD0}%date%%{F-}  %{F#CCCCCC}%time%%{F-}

[module/playerctl]
type = custom/script
exec = spotify_status=$(playerctl --player=spotify status 2>/dev/null); firefox_status=$(playerctl --player=firefox status 2>/dev/null); if [ "$spotify_status" = "Playing" ]; then playerctl --player=spotify metadata --format "{{artist}} - {{title}}"; elif [ "$firefox_status" = "Playing" ]; then playerctl --player=firefox metadata --format "{{title}}"; else echo ""; fi
interval = 2
label = %{F#00FFD0}PLAYING%{F-} %{F#CCCCCC}%output%%{F-}
click-left = playerctl --player=spotify play-pause
click-right = playerctl --player=spotify next
click-middle = playerctl --player=spotify previous

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/bluetooth.sh
interval = 5
click-left = ~/.config/polybar/bluetooth.sh toggle
click-right = blueman-manager
label = %{F#00FFD0}%output%%{F-}

[module/cpu]
type = internal/cpu
interval = 2
label = %{F#00FFD0}CPU%{F-} %{F#CCCCCC}%percentage:2%%%{F-}

[module/memory]
type = internal/memory
interval = 2
label = %{F#00FFD0}RAM%{F-} %{F#CCCCCC}%used% / %total%%{F-}

[module/wireless]
type = internal/network
interface = wlp0s20f3
interval = 3
label-connected = %{F#00FFD0}NET%{F-} %{F#CCCCCC}%essid% %downspeed%%{F-}
label-disconnected = %{F#FF8C00}NET offline%{F-}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 98
label-charging = %{F#00FFD0}BAT%{F-} %{F#FF8C00}%percentage%%%{F-}+
label-discharging = %{F#00FFD0}BAT%{F-} %{F#CCCCCC}%percentage%%%{F-}
label-full = %{F#00FFD0}BAT%{F-} %{F#00FFD0}full%{F-}

[module/lock]
type = custom/text
content = %{F#FF8C00}LOCK%{F-}
click-left = loginctl lock-session

[settings]
screenchange-reload = true
